<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mooz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <h1><span class="logo-m">M</span>ooz</h1>
    <span class="participants" id="participantCount">0 Participants</span>
  </header>

  <div class="main-container">
    <div class="videos-container" id="video_container">

      <div class="grid-area" id="gridArea">
        <div class="video-wrapper" id="wrapper-local">
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="cam-off-placeholder">
            <div class="cam-avatar" id="localAvatar"></div>
            <span id="localAvatarName"></span>
          </div>
          <span class="video-label">You</span>
        </div>
      </div>

      <div class="controls-container">
        <div class="left-controls">
          <span class="btn" id="audioBtn">Mic <b>On</b></span>
          <span class="btn" id="videoBtn">Cam <b>On</b></span>
          <span class="btn" id="presentBtn">Present</span>
          <span class="btn" id="chatToggle">Chat</span>
        </div>
        <span class="btn leave" id="leaveBtn">Leave</span>
      </div>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="chat-header">
        <b>Chat</b>
        <span class="chat-close" id="chatClose">✕</span>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Message…" />
        <button onclick="sendMessage()" class="btn send-btn">Send</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    // Set local avatar color + initial after userName is known
    const _name = localStorage.getItem("name") || "User";
    const _colors = ["#e74c6f","#e7a23c","#3ca9e7","#8c3ce7","#3ce76f","#e7563c","#3ce7d4"];
    let _h = 0; for (let i = 0; i < _name.length; i++) _h = (_h * 31 + _name.charCodeAt(i)) >>> 0;
    document.getElementById("localAvatar").style.background = _colors[_h % _colors.length];
    document.getElementById("localAvatar").textContent = _name[0].toUpperCase();
    document.getElementById("localAvatarName").textContent = _name;
  </script>
</body>
</html>
