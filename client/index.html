<!DOCTYPE html>
<html>
<head>  
    <title>Mooz</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="top-bar">
        <h1><span class="logo-m">M</span>ooz</h1>
        <span class="participants">0 Participants</span>
    </header>

    <div class="main-container">

        <div class="videos-container">
            <video></video>

            <div class="controls-container">
                <div class="left-controls">
                    <span class="btn">Audio: <b>On</b></span>
                    <span class="btn">Video: <b>On</b></span>
                    <span class="btn">Present</span>
                    <span class="btn">Chat</span>
                </div>

                <span class="btn leave">Leave</span>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <b>Chat</b>
            </div>

            <div class="chat-messages">
                <div><b>Name:</b> Message</div>
            </div>

            <div class="chat-input">
                <input type="text" placeholder="Type your message"/>
                <button class="btn">Send</button>
            </div>
        </div>

    </div>
</body>
</html>
