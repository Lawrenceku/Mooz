<!DOCTYPE html>
<html>
<head>
  <title>Mooz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <h1><span class="logo-m">H</span>icon-video-conferenceing</h1>
    <span class="participants" id="participantCount">0 Participants</span>
  </header>

  <div class="main-container">
    <div class="videos-container" id="video_container">

      <div class="video-wrapper" id="wrapper-local">
        <video id="localVideo" autoplay playsinline muted></video>
        <span class="video-label">You</span>
      </div>

      <div id="videoGrid"></div>

      <div class="controls-container">
        <div class="left-controls">
          <span class="btn" id="audioBtn">Audio: <b>On</b></span>
          <span class="btn" id="videoBtn">Video: <b>On</b></span>
          <span id="presentBtn" class="btn">Present</span>
          <span class="btn" id="chatToggle">Chat</span>
        </div>
        <span class="btn leave" id="leaveBtn">Leave</span>
      </div>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="chat-header"><b>Chat</b></div>
      <div class="chat-messages" id="chatMessages">
        <div id="chat-message"><b id="chat-name"></b></div>
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type your message" />
        <button onclick="sendMessage()" class="btn">Send</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
